<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeLaunchAI AI</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --text: #1a2433;
      --link: #0a66c2;
      --card: #ffffff;
      --border: #d8e0eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef4fb 0%, var(--bg) 100%);
      display: grid;
      grid-template-rows: 1fr auto;
    }

    main {
      max-width: 860px;
      margin: 48px auto;
      padding: 24px;
      width: 100%;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(14, 26, 43, 0.08);
    }

    h1 {
      margin-top: 0;
    }

    .site-footer {
      text-align: center;
      padding: 16px 20px 24px;
      border-top: 1px solid var(--border);
      background: #ffffffcc;
      backdrop-filter: blur(4px);
    }

    .site-footer a {
      color: var(--link);
      font-weight: 600;
      text-decoration: none;
    }

    .site-footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>CodeLaunchAI AI</h1>
      <p>Starter page for Vercel deployment.</p>
    </section>
  </main>

  <footer class="site-footer">
    Website designed and maintained by
    <a href="https://www.splendidtechnology.co.uk?utm_source=chatgpt.com" target="_blank" rel="noopener noreferrer">Splendid Technology</a>
  </footer>
</body>
</html>
